[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install --assume-yes --no-install-recommends default-jre-headless",
]

[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install --assume-yes --no-install-recommends default-jre-headless",
]
