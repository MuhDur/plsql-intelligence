schema_version = 1

[policy]
require_public_entries = true
allow_reference_only_sources = true

# Every committed file under `corpus/public/` must have one `[[file]]` entry.
# Files without redistribution permission may be referenced by URL but must not
# be vendored into the repository.
#
# Example:
# [[file]]
# path = "public/oracle-samples/hr/create.sql"
# source_url = "https://github.com/oracle-samples/db-sample-schemas"
# license = "UPL-1.0"
# redistribution_allowed = true
# fetched_on = "2026-05-11"
# notes = "Oracle HR sample schema, vendored verbatim"

