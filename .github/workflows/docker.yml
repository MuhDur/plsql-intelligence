name: Docker image (plsql-mcp)

# Build the full PL/SQL Intelligence server image (live Oracle DB tools +
# intelligence) and push it to GHCR (ghcr.io/muhdur/plsql-mcp). The image
# does not bundle Oracle Instant Client. It carries the
# io.modelcontextprotocol.server.name label the MCP registry needs.
on:
  push:
    tags: ["v*", "plsql-mcp-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 0.6.1)"
        required: true
        default: "0.6.1"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build + push (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            ref="${GITHUB_REF_NAME}"
            case "$ref" in
              plsql-mcp-v*) version="${ref#plsql-mcp-v}" ;;
              v*) version="${ref#v}" ;;
              *) version="$ref" ;;
            esac
          fi
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "::error::unsupported image version '$version' from ref '${GITHUB_REF_NAME:-manual}'"
            exit 1
          fi
          echo "v=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/muhdur/plsql-mcp:${{ steps.ver.outputs.v }}
            ghcr.io/muhdur/plsql-mcp:latest
          provenance: false
