name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude plsql-mcp --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude plsql-mcp --all-targets
      - run: cargo test --workspace --exclude plsql-mcp --doc

  # Offline pivot transition job: stable is the default everywhere else; this
  # job keeps the remaining live/codegen/MCP surfaces compiling on the pinned
  # nightly until Phase 2/5 removes or relocates them.
  nightly-transition:
    name: nightly transition (live/codegen/plsql-mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-05-11
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-transition
      - name: Check gated catalog live adapter
        run: cargo +nightly-2026-05-11 check -p plsql-catalog --features oraclemcp-db
      - name: Check gated CI/CD live adapter
        run: cargo +nightly-2026-05-11 check -p plsql-cicd --features live-xe
      - name: Build committed ANTLR backend
        run: cargo +nightly-2026-05-11 build -p plsql-parser-antlr --features antlr-codegen
      - name: Build transitional plsql-mcp
        run: cargo +nightly-2026-05-11 build -p plsql-mcp --all-targets

  antlr-generated-drift:
    name: ANTLR generated drift check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: antlr-generated-drift
      - name: Regenerate ANTLR source into temp dir
        env:
          PLSQL_ANTLR_REGEN: "1"
          PLSQL_ANTLR_REGEN_DIR: ${{ runner.temp }}/plsql-parser-antlr-generated
        run: cargo +stable build -p plsql-parser-antlr --features antlr-codegen
      - name: Compare generated source with committed copy
        run: diff -ru crates/plsql-parser-antlr/src/generated "${RUNNER_TEMP}/plsql-parser-antlr-generated"

  # `oracle-plsql-converge-0lnu.15.12` — keep the PL/SQL layer from reaching
  # around the published oraclemcp-db adapter into Oracle drivers or async/server
  # runtimes directly.
  plsql-mcp-boundary-lint:
    name: plsql-mcp boundary lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run forbidden dependency boundary lint
        run: scripts/plsql_mcp_boundary_lint.sh
      - name: Prove planted violation fails
        run: scripts/plsql_mcp_boundary_lint.sh --self-test

  # `oracle-plsql-converge-0lnu.15.13` — keep release-visible docs, package
  # metadata, source docs, and workflow text from drifting back into stale
  # overclaims after the truth-up pass.
  plsql-mcp-honesty-grep:
    name: plsql-mcp honesty grep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run honesty-grep gate
        run: scripts/plsql_mcp_honesty_grep.sh
      - name: Prove planted forbidden string fails
        run: scripts/plsql_mcp_honesty_grep.sh --self-test

  # `oracle-plsql-converge-0lnu.15.14` — keep plsql-mcp's published
  # oraclemcp-* spine pins current with crates.io so the adapter cannot
  # silently fall minors behind again.
  oraclemcp-pin-guard:
    name: oraclemcp pin guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check published oraclemcp-* pin currency
        run: scripts/oraclemcp_pin_guard.sh
      - name: Prove planted stale pin fails
        run: scripts/oraclemcp_pin_guard.sh --self-test

  # NOTE: the engine-free oraclemcp-* MCP spine classifier cargo-fuzz smoke moved
  # to the standalone MuhDur/oraclemcp repo in Phase-E. That CI job now lives
  # there; plsql-mcp consumes the published crates.

  # `oracle-qmwz.1.2` (P0-1) — supply-chain gates for the oraclemcp build.
  supply-chain:
    name: cargo deny + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo deny (advisories, licenses, bans, sources)
        run: |
          cargo install --locked cargo-deny || true
          cargo deny check
      - name: cargo audit (RUSTSEC advisories)
        run: |
          cargo install --locked cargo-audit || true
          cargo audit || true

  bench-no-run:
    name: cargo bench --no-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --exclude plsql-mcp --no-run

  corpus-license-check:
    name: corpus license check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p corpus-license-check

  # Surrogate for `PLSQL-PARSE-012` — once the parse-corpus harness lands it
  # will replace this job with structured parse-quality metrics (clean rate,
  # recovered rate, skipped-token ratio, top-level recognition).
  parse-success:
    name: parse-success (parser tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p plsql-parser -p plsql-parser-antlr

  # `PLSQL-LAB-010` — lab-as-release-gate. PR-blocking CI for drift
  # in `corpus/lab/expected/*.json` goldens. Fails if any golden is
  # invalid JSON, or if the lineage tests that consume the goldens
  # regress. Cheap (no Oracle, no docker); runs on every PR.
  lab-gate:
    name: lab-gate (corpus/lab goldens, PR-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make lab-gate

  # `PLSQL-LAB-003` — sanity-check the L1 hero diff golden artifact
  # via `make demo-no-db-verify`. Cheap (no Oracle, no docker) so it
  # runs on every PR; it asserts the parse_change_file pipeline
  # consumes the diff and the golden JSON is present.
  demo-no-db:
    name: demo-no-db (hero-diff golden gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make demo-no-db-verify

  # `PLSQL-PLAN-002` — run plan-lint on every push/PR. Now a blocking
  # gate (PLSQL-PLAN-003 closed all known error-severity drift); warnings
  # still surface but don't fail the build.
  plan-lint:
    name: plan-lint (structural integrity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run plan-lint (human report)
        run: cargo run -p plan-lint -- --doctor
      - name: Run plan-lint (JSON report)
        run: cargo run -p plan-lint -- --robot-json > plan-lint-report.json
      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-lint-report
          path: plan-lint-report.json
          if-no-files-found: ignore
