name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PLSQL_RELEASE_VERSION: ${{ inputs.tag || github.ref_name }}
  # Public binaries (i.e., those intended for end users). Internal-only
  # dev tools like `plan-lint` and `corpus-license-check` stay out of the
  # release archive. `plsql-mcp` remains a transitional nightly-only artifact
  # until the offline-pivot sign-off bead removes it from this repo.
  RELEASE_STABLE_PACKAGES: "plsql-depgraph plsql-cicd"
  RELEASE_STABLE_BINS: "plsql-depgraph plsql"
  RELEASE_NIGHTLY_PACKAGES: "plsql-mcp"
  RELEASE_NIGHTLY_BINS: "plsql-mcp"
  RELEASE_BINS: "plsql-depgraph plsql-mcp plsql"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install pinned nightly for transitional plsql-mcp
        shell: bash
        run: rustup toolchain install nightly-2026-05-11 --profile minimal --target ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build stable release binaries (cargo)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          set -euo pipefail
          # Build only the public stable binaries — internal dev tools
          # (plan-lint, corpus-license-check) stay out of the release path.
          args=()
          for package in $RELEASE_STABLE_PACKAGES; do
            args+=("-p" "$package")
          done
          for bin in $RELEASE_STABLE_BINS; do
            args+=("--bin" "$bin")
          done
          cargo build --release --target ${{ matrix.target }} "${args[@]}"
      - name: Build transitional plsql-mcp (cargo nightly)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          for package in $RELEASE_NIGHTLY_PACKAGES; do
            args+=("-p" "$package")
          done
          for bin in $RELEASE_NIGHTLY_BINS; do
            args+=("--bin" "$bin")
          done
          cargo +nightly-2026-05-11 build --release --target ${{ matrix.target }} "${args[@]}"
      - name: Build stable release binaries (cross)
        if: matrix.cross
        shell: bash
        run: |
          set -euo pipefail
          args=()
          for package in $RELEASE_STABLE_PACKAGES; do
            args+=("-p" "$package")
          done
          for bin in $RELEASE_STABLE_BINS; do
            args+=("--bin" "$bin")
          done
          cross build --release --target ${{ matrix.target }} "${args[@]}"
      - name: Build transitional plsql-mcp (cross nightly)
        if: matrix.cross
        shell: bash
        run: |
          set -euo pipefail
          args=()
          for package in $RELEASE_NIGHTLY_PACKAGES; do
            args+=("-p" "$package")
          done
          for bin in $RELEASE_NIGHTLY_BINS; do
            args+=("--bin" "$bin")
          done
          cross +nightly-2026-05-11 build --release --target ${{ matrix.target }} "${args[@]}"
      - name: Stage release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-staging
          for bin in $RELEASE_BINS; do
            ext=""
            case "${{ matrix.target }}" in
              *windows*) ext=".exe" ;;
            esac
            src="target/${{ matrix.target }}/release/${bin}${ext}"
            if [[ ! -f "$src" ]]; then
              echo "::error::missing expected release binary: $src"
              exit 1
            fi
            dst="release-staging/${bin}-${{ matrix.target }}${ext}"
            cp "$src" "$dst"
          done
      - name: Upload per-target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plsql-intelligence-${{ matrix.target }}
          path: release-staging/*
          if-no-files-found: error

  publish:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all target artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: plsql-intelligence-*
          merge-multiple: true
      - name: Generate SHA256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          mapfile -d '' files < <(find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z)
          if (( ${#files[@]} == 0 )); then
            echo "::error::no release artifacts found"
            exit 1
          fi
          sha256sum "${files[@]}" | sed 's#  \./#  #' > SHA256SUMS
          cat SHA256SUMS
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-artifacts/*
