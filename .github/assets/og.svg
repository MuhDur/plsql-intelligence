<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="PL/SQL Intelligence Engine - offline Oracle PL/SQL code intelligence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1020"/>
      <stop offset="1" stop-color="#17213a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.80" cy="0.36" r="0.58">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="7" fill="url(#accent)"/>

  <text x="92" y="148" font-family="system-ui, 'DejaVu Sans', Segoe UI, Roboto, sans-serif" font-size="25" font-weight="700" letter-spacing="3" fill="#38bdf8">OFFLINE ORACLE PL/SQL CODE INTELLIGENCE</text>
  <text x="88" y="245" font-family="system-ui, 'DejaVu Sans', Segoe UI, Roboto, sans-serif" font-size="78" font-weight="750" fill="#f8fafc">PL/SQL Intelligence</text>
  <text x="92" y="315" font-family="system-ui, 'DejaVu Sans', Segoe UI, Roboto, sans-serif" font-size="38" font-weight="600" fill="#cbd5e1">Know what breaks before PL/SQL changes.</text>

  <g font-family="system-ui, 'DejaVu Sans', Segoe UI, Roboto, sans-serif" font-size="29" fill="#d8f3f0">
    <g transform="translate(96,400)">
      <circle cx="0" cy="-9" r="6" fill="url(#accent)"/>
      <text x="22" y="0">Parser, catalog snapshots, dependency graph, lineage</text>
    </g>
    <g transform="translate(96,452)">
      <circle cx="0" cy="-9" r="6" fill="url(#accent)"/>
      <text x="22" y="0">SAST, change-impact, docs, bindings, CI/CD prediction</text>
    </g>
    <g transform="translate(96,504)">
      <circle cx="0" cy="-9" r="6" fill="url(#accent)"/>
      <text x="22" y="0">Offline by default, honest uncertainty, safe Rust</text>
    </g>
  </g>

  <text x="96" y="582" font-family="ui-monospace, 'DejaVu Sans Mono', monospace" font-size="23" fill="#7dd3fc">github.com/MuhDur/plsql-intelligence  |  Apache-2.0 OR MIT</text>

  <g transform="translate(1040,190)" stroke="url(#accent)" stroke-width="3" fill="#0f2a3f">
    <line x1="0" y1="0" x2="92" y2="58" stroke-opacity="0.9"/>
    <line x1="0" y1="0" x2="-28" y2="120" stroke-opacity="0.65"/>
    <line x1="92" y1="58" x2="34" y2="172" stroke-opacity="0.9"/>
    <line x1="-28" y1="120" x2="34" y2="172" stroke-opacity="0.65"/>
    <line x1="34" y1="172" x2="128" y2="232" stroke-opacity="0.9"/>
    <circle cx="0" cy="0" r="24"/>
    <circle cx="92" cy="58" r="22"/>
    <circle cx="-28" cy="120" r="20"/>
    <circle cx="34" cy="172" r="22"/>
    <circle cx="128" cy="232" r="24"/>
  </g>
</svg>
