<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="plsql-mcp — PL/SQL Intelligence MCP server in pure Rust">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#10203a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.34" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>

  <text x="96" y="210" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'DejaVu Sans Mono', monospace" font-size="104" font-weight="700" fill="#e8f0ff">plsql<tspan fill="url(#accent)">-mcp</tspan></text>
  <text x="100" y="270" font-family="system-ui, 'DejaVu Sans', Segoe UI, Roboto, sans-serif" font-size="34" font-weight="600" fill="#9fb3d1">PL/SQL Intelligence — analysis + safe DB access</text>

  <g font-family="system-ui, 'DejaVu Sans', Segoe UI, Roboto, sans-serif" font-size="30" fill="#cde9f5">
    <g transform="translate(100,340)">
      <circle cx="0" cy="-9" r="6" fill="url(#accent)"/>
      <text x="22" y="0">Parse · dependency graph · lineage · SAST · impact</text>
    </g>
    <g transform="translate(100,396)">
      <circle cx="0" cy="-9" r="6" fill="url(#accent)"/>
      <text x="22" y="0">Includes everything oraclemcp does (safe live DB)</text>
    </g>
    <g transform="translate(100,452)">
      <circle cx="0" cy="-9" r="6" fill="url(#accent)"/>
      <text x="22" y="0">Pure Rust · #![forbid(unsafe_code)] · honest uncertainty</text>
    </g>
  </g>

  <text x="100" y="556" font-family="ui-monospace, 'DejaVu Sans Mono', monospace" font-size="24" fill="#6f86a8">docker run ghcr.io/muhdur/plsql-mcp &#160;&#183;&#160; Apache-2.0 OR MIT</text>

  <!-- Dependency-graph motif: nodes + edges (evokes depgraph / lineage) -->
  <g transform="translate(1015,150)" stroke="url(#accent)" stroke-width="3" fill="#0e2a44">
    <line x1="70" y1="40" x2="160" y2="120" stroke-opacity="0.8"/>
    <line x1="70" y1="40" x2="40" y2="160" stroke-opacity="0.8"/>
    <line x1="160" y1="120" x2="40" y2="160" stroke-opacity="0.8"/>
    <line x1="160" y1="120" x2="150" y2="230" stroke-opacity="0.8"/>
    <line x1="40" y1="160" x2="150" y2="230" stroke-opacity="0.8"/>
    <circle cx="70" cy="40" r="22"/>
    <circle cx="160" cy="120" r="22"/>
    <circle cx="40" cy="160" r="22"/>
    <circle cx="150" cy="230" r="22"/>
  </g>
</svg>
