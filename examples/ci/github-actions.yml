# Example GitHub Actions workflow that comments on PRs touching PL/SQL
# with the release-0.5.0 `plsql predict --robot-json` blast-radius
# payload. Drop this into `.github/workflows/` of a downstream PL/SQL
# repository and adjust the `paths:` filter to match the consumer's
# source layout.
#
# This example assumes the composite action directory
# `.github/actions/plsql-change-impact/` is vendored alongside the
# workflow. Consumers that prefer a central template should pin the
# action to a release tag in the plsql-intelligence repository instead.
#
# Plan reference: §15 (CI/CD Recompilation Cascade) + §15.5 (CICD bead seeds).

name: plsql-cicd

on:
  pull_request:
    paths:
      - "**/*.sql"
      - "**/*.pks"
      - "**/*.pkb"
      - "**/*.tps"
      - "**/*.tpb"
      - "**/*.trg"
      - "**/*.vw"

permissions:
  contents: read
  issues: write          # required by the issue-comments API endpoint
  pull-requests: read

jobs:
  plsql-change-impact:
    name: PL/SQL change impact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full depth for git-diff classification)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install plsql CLI
        # Replace with the official install one-liner once published.
        # During development, build from a sibling checkout instead.
        run: |
          curl -fsSL https://example.invalid/install.sh | bash -s -- --version 0.x

      - name: Predict and comment on PL/SQL blast radius
        id: impact
        uses: ./.github/actions/plsql-change-impact
        with:
          plsql-bin: plsql
          git-range: ${{ github.event.pull_request.base.sha }}..${{ github.sha }}
          mode: catalog-aware
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plsql-cicd-reports
          path: |
            ${{ steps.impact.outputs.predict-json }}
            ${{ steps.impact.outputs.comment-body }}
          if-no-files-found: error
