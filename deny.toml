# cargo-deny configuration for the plsql-intelligence / oraclemcp workspace.
# Supply-chain CI gate (bead P0-1). The one-way oraclemcp-* boundary is a
# separate check (scripts/oraclemcp_boundary_lint.sh), since cargo-deny bans
# are global and cannot express "this crate must not depend on plsql-engine"
# while plsql-mcp legitimately does.

[advisories]
version = 2
# Fail the build on a known security advisory; warn (don't fail) on yanked or
# unmaintained crates so a transitive yank doesn't wedge CI unrelated to a fix.
yanked = "warn"
ignore = [
    # Transitive, unmaintained-only (NOT vulnerabilities), no safe upgrade —
    # accepted until upstream drops them. Real vulnerability advisories still
    # fail the build.
    # `paste` 1.0.x via the Oracle driver (oracle 0.6.x).
    "RUSTSEC-2024-0436",
    # `instant` via parking_lot 0.11 -> parking_lot_core 0.8.6.
    "RUSTSEC-2024-0384",
]

[licenses]
version = 2
# The workspace is Apache-2.0 OR MIT; allow the permissive set the dependency
# tree (incl. the Oracle driver's UPL/Apache-2.0) draws from.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "UPL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
